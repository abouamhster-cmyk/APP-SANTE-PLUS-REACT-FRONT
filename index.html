<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- ============================================================
    PWA META TAGS
    ============================================================ -->
    <meta name="theme-color" content="#1a4a3a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Santé Plus" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Santé Plus" />
    
    <!-- ============================================================
    APPLE TOUCH ICONS
    ============================================================ -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icon-72.png" />
    <link rel="apple-touch-icon" sizes="96x96" href="/icon-96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icon-128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icon-144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="/icon-256.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    
    <!-- ============================================================
    MANIFEST
    ============================================================ -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ============================================================
    MICROSOFT / WINDOWS
    ============================================================ -->
    <meta name="msapplication-TileColor" content="#1a4a3a" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    
    <!-- ============================================================
    SEO
    ============================================================ -->
    <meta name="description" content="Santé Plus Services - Accompagnement humain et coordination à domicile" />
    <meta property="og:title" content="Santé Plus Services" />
    <meta property="og:description" content="Accompagnement humain et coordination à domicile" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:url" content="https://app-sante-plus-react.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Santé Plus Services" />
    <meta name="twitter:description" content="Accompagnement humain et coordination à domicile" />
    <meta name="twitter:image" content="/icon-512.png" />
    
    <title>Santé Plus Services</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- ============================================================
    SERVICE WORKER REGISTRATION
    ============================================================ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // ✅ 1. Service Worker PWA principal
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('✅ SW PWA enregistré:', registration);
            })
            .catch((error) => {
              console.error('❌ Erreur SW PWA:', error);
            });

          // ✅ 2. Service Worker Firebase (avec scope explicite)
          navigator.serviceWorker.register('/firebase-messaging-sw.js', { scope: '/' })
            .then((registration) => {
              console.log('✅ SW Firebase enregistré:', registration);
              // ✅ Stocker la référence pour l'utiliser dans getToken
              window.firebaseSWRegistration = registration;
            })
            .catch((error) => {
              console.error('❌ Erreur SW Firebase:', error);
            });
        });
      } else {
        console.warn('⚠️ Service Workers non supportés par ce navigateur');
      }
    </script>
    
    <!-- ============================================================
    SON DE NOTIFICATION
    ============================================================ -->
    <audio id="notification-sound" preload="auto">
      <source src="/notification.mp3" type="audio/mpeg">
    </audio>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
